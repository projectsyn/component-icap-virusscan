parameters:
  icap_virusscan:
    =_metadata:
      multi_tenant: true
      multi_instance: true
      multi_version: true
    namespace: ${_instance}

    debug: false
    test: false

    createNamespace: true
    namespaceAnnotations: {}
    namespaceLabels: {}

    monitoring:
      enabled: false
      prometheusrules:
        - name: monitoring
          syn_team:
          rules:
            - alert: KubernetesReplicasetReplicasMismatch
              annotations:
                runbook_url: "alert.rubook.com"
                summary: "Kubernetes ReplicaSet replicas mismatch (instance {{ $labels.instance }})"
                description: >-
                  "ReplicaSet {{ $labels.namespace }}/{{ $labels.replicaset }} replicas mismatch\n
                  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
              expr: kube_replicaset_spec_replicas{namespace=~"${_instance}"} > kube_replicaset_status_ready_replicas{namespace=~"${_instance}"}
              for: 2m
              keep_firing_for: 10m
              labels:
                severity: warning
            - alert: ContainerOOMKilled
              expr: (kube_pod_container_status_restarts_total{namespace="${_instance}"} - kube_pod_container_status_restarts_total{namespace="${_instance}"} offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled",namespace="${_instance}"}[10m]) == 1
              for: 2m
              labels:
                severity: warning
              annotations:
                summary: Kubernetes Container oom killer (instance {{ $labels.instance }})
                description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
              keep_firing_for: 10m

    enable_squid: false
    squid_domain:
    httproute:
      enabled: false
      gatewayClassName: microgateway-cloudscale
      gatewayName:
      gatewayNamespace:
      sectionName: http-default
    replicas: 2
    minAvailable: 1
    env:
      clamav: {}
      c-icap:
        CLAMD_MAXSIZE: 50m
        CLAMD_IP: 127.0.0.1
    deployments:
      clamav-icap:
        metadata: {}
        spec:
          strategy:
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
          template:
            spec: {}
        container_cicap:
          # renovate: datasource=docker depName=ghcr.io/vshn/c-icap
          image: "ghcr.io/vshn/c-icap:20260420_095301"
          resources:
            requests:
              cpu: "120m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"
          livenessProbe:
            tcpSocket:
              port: 1344
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 1344
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 1344
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
        container_clamav:
          # renovate: datasource=docker depName=ghcr.io/vshn/clamav
          image: "ghcr.io/vshn/clamav:20260420_095651"
          resources:
            requests:
              cpu: "120m"
              memory: "1280Mi"
            limits:
              cpu: "2000m"
              memory: "3072Mi"
          livenessProbe:
            tcpSocket:
              port: 3310
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      squid:
        metadata: {}
        spec:
          template:
            spec: {}
        container_squid:
          # renovate: datasource=docker depName=ghcr.io/bacluc/squid
          image: "ghcr.io/bacluc/squid:2"
          resources:
            requests:
              cpu: '120m'
              memory: '200Mi'
            limits:
              memory: '400Mi'
          livenessProbe:
            tcpSocket:
              port: 3128
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      squid-nginx:
        metadata: {}
        spec:
          template:
            spec: {}
        container_nginx:
          # renovate: datasource=docker depName=ghcr.io/nginx/nginx-unprivileged
          image: "ghcr.io/nginx/nginx-unprivileged:1.30.0-alpine3.23"
          resources:
            requests:
              cpu: '50m'
              memory: '50Mi'
            limits:
              memory: '100Mi'
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
    allowFromNamespaces: []
#      - matchLabels:
#          app: frontend
#      - matchExpressions:
#          - key: env
#            operator: In
#            values:
#              - prod
