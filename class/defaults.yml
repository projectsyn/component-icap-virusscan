parameters:
  icap_virusscan:
    =_metadata:
      multi_tenant: true
      multi_instance: true
      multi_version: true
    namespace: syn-icap-virusscan

    debug: false

    createNamespace: true
    namespaceAnnotations: {}
    namespaceLabels: {}

    enable_squid: false
    squid_domain:
    replicas: 2
    minAvailable: 1
    env:
      clamav: {}
      c-icap:
        CLAMD_MAXSIZE: 50m
        CLAMD_IP: 127.0.0.1
    deployments:
      clamav-icap:
        metadata: {}
        spec:
          strategy:
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
          template:
            spec: {}
        container_cicap:
          image: "ghcr.io/bacluc/c-icap:1"
          resources:
            requests:
              cpu: "120m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"
          livenessProbe:
            tcpSocket:
              port: 1344
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 1344
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 1344
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
        container_clamav:
          image: "ghcr.io/bacluc/clamav:1"
          resources:
            requests:
              cpu: "120m"
              memory: "1280Mi"
            limits:
              cpu: "2000m"
              memory: "3072Mi"
          livenessProbe:
            tcpSocket:
              port: 3310
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      squid:
        metadata: {}
        spec:
          template:
            spec: {}
        container_squid:
          image: "ghcr.io/bacluc/squid:1"
          resources:
            requests:
              cpu: '120m'
              memory: '200Mi'
            limits:
              memory: '400Mi'
          livenessProbe:
            tcpSocket:
              port: 3128
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
    allowFromNamespaces: []
#      - matchLabels:
#          app: frontend
#      - matchExpressions:
#          - key: env
#            operator: In
#            values:
#              - prod
