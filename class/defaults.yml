parameters:
  icap_virusscan:
    =_metadata:
      multi_tenant: true
      multi_instance: true
      multi_version: true
    namespace: ${_instance}

    debug: false

    createNamespace: true
    namespaceAnnotations: {}
    namespaceLabels: {}

    monitoring:
      enabled: false
      prometheusRuleSpec: {}

    images:
      cicap:
        registry: ghcr.io
        repository: vshn/c-icap
        # renovate: datasource=docker depName=ghcr.io/vshn/c-icap
        tag: "20260702_140905"
      clamav:
        registry: ghcr.io
        repository: vshn/clamav
        # renovate: datasource=docker depName=ghcr.io/vshn/clamav
        tag: "20260713_173424"
      squid:
        registry: ghcr.io
        repository: bacluc/squid
        tag: "2"
      nginx:
        registry: ghcr.io
        repository: nginx/nginx-unprivileged
        tag: "1.31.2-alpine3.23"

    enable_squid: false
    squid_domain:
    httproute:
      enabled: false
      gatewayClassName: microgateway-cloudscale
      gatewayName:
      gatewayNamespace:
      sectionName: http-default
    replicas: 2
    replicasWithOptionalAntiAffinity: 0
    minAvailable: 1
    env:
      clamav: {}
      c-icap:
        CLAMD_MAXSIZE: 50m
        CLAMD_IP: 127.0.0.1
    deployments:
      clamav-icap:
        metadata: {}
        spec:
          strategy:
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
          template:
            spec: {}
        container_cicap:
          image: ${icap_virusscan:images:cicap:registry}/${icap_virusscan:images:cicap:repository}:${icap_virusscan:images:cicap:tag}
          resources:
            requests:
              cpu: "120m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"
          livenessProbe:
            tcpSocket:
              port: 1344
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 1344
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 1344
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
        container_clamav:
          image: ${icap_virusscan:images:clamav:registry}/${icap_virusscan:images:clamav:repository}:${icap_virusscan:images:clamav:tag}
          resources:
            requests:
              cpu: "120m"
              memory: "1280Mi"
            limits:
              cpu: "2000m"
              memory: "3072Mi"
          livenessProbe:
            tcpSocket:
              port: 3310
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      squid:
        metadata: {}
        spec:
          template:
            spec: {}
        container_squid:
          image: ${icap_virusscan:images:squid:registry}/${icap_virusscan:images:squid:repository}:${icap_virusscan:images:squid:tag}
          resources:
            requests:
              cpu: '120m'
              memory: '200Mi'
            limits:
              memory: '400Mi'
          livenessProbe:
            tcpSocket:
              port: 3128
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      squid-nginx:
        metadata: {}
        spec:
          template:
            spec: {}
        container_nginx:
          image: ${icap_virusscan:images:nginx:registry}/${icap_virusscan:images:nginx:repository}:${icap_virusscan:images:nginx:tag}
          resources:
            requests:
              cpu: '50m'
              memory: '50Mi'
            limits:
              memory: '100Mi'
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
    allowFromNamespaces: []
#      - matchLabels:
#          app: frontend
#      - matchExpressions:
#          - key: env
#            operator: In
#            values:
#              - prod
