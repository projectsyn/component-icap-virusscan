parameters:
  with_squid_proxy:
    debug: true
    test: true
    enable_squid: true
    squid_domain: test-icap-virusscan.apps.c-hin-test-rma1.hin-infra.ch
    env:
      clamav:
        TEST: true
      c-icap:
        ANOTHER_TEST: false
    httproute:
      enabled: true
      gatewayName: gateway-dev
      gatewayNamespace: gateway-dev-ns
    deployments:
      clamav-icap:
        metadata:
          labels:
            add-label: "from_with_squid_proxy"
          annotations:
            add-annotation: "from_with_squid_proxy"
        spec:
          template:
            metadata:
              labels:
                add-label: "from_with_squid_proxy"
              annotations:
                add-annotation: "from_with_squid_proxy"
            spec: {}
        container_cicap:
          # renovate: datasource=docker depName=ghcr.io/vshn/c-icap
          image: "ghcr.io/vshn/c-icap:20260420_095301"
          resources:
            requests:
              cpu: "100m"
        container_clamav:
          # renovate: datasource=docker depName=ghcr.io/vshn/clamav
          image: "ghcr.io/vshn/clamav:20260420_095612"
          resources:
            limits:
              memory: "4072Mi"
      squid:
        metadata:
          labels:
            add-label: "from_with_squid_proxy"
          annotations:
            add-annotation: "from_with_squid_proxy"
        spec:
          template:
            metadata:
              labels:
                add-label: "from_with_squid_proxy"
              annotations:
                add-annotation: "from_with_squid_proxy"
        container_squid:
          # renovate: datasource=docker depName=ghcr.io/bacluc/squid
          image: "ghcr.io/bacluc/squid:2"
          resources:
            requests:
              cpu: '100m'
              memory: '210Mi'
            limits:
              memory: '400Mi'
    allowFromNamespaces:
      - matchLabels:
          kubernetes.io/metadata.name: vshn-airlock-dev-01
      - matchExpressions:
          - key: env
            operator: In
            values:
              - prod
