apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app: clamav-icap
    instance: defaults
  name: clamav-icap
  namespace: defaults
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: clamav-icap
      instance: defaults
  unhealthyPodEvictionPolicy: IfHealthyBudget
