apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app: clamav-icap
    instance: with_squid_proxy
  name: clamav-icap
  namespace: with_squid_proxy
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: clamav-icap
      instance: with_squid_proxy
  unhealthyPodEvictionPolicy: IfHealthyBudget
