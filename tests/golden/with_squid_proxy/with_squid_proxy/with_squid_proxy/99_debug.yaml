apiVersion: v1
data:
  debug: |
    _metadata:
      multi_instance: true
      multi_tenant: true
      multi_version: true
    allowFromNamespaces:
    - matchLabels:
        kubernetes.io/metadata.name: "vshn-airlock-dev-01"
    - matchExpressions:
      - key: "env"
        operator: "In"
        values:
        - "prod"
    createNamespace: true
    debug: true
    deployments:
      clamav-icap:
        container_cicap:
          image: "escaped/image"
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
              port: 1344
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 1
            initialDelaySeconds: 0
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: 1344
            timeoutSeconds: 3
          resources:
            limits:
              cpu: "500m"
              memory: "500Mi"
            requests:
              cpu: "100m"
              memory: "200Mi"
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 5
            tcpSocket:
              port: 1344
            timeoutSeconds: 5
        container_clamav:
          image: "escaped/image"
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
              port: 3310
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 1
            initialDelaySeconds: 0
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: 3310
            timeoutSeconds: 3
          resources:
            limits:
              cpu: "2000m"
              memory: "4072Mi"
            requests:
              cpu: "120m"
              memory: "1280Mi"
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 5
            tcpSocket:
              port: 3310
            timeoutSeconds: 5
        metadata:
          annotations:
            add-annotation: "from_with_squid_proxy"
          labels:
            add-label: "from_with_squid_proxy"
        spec:
          strategy:
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
          template:
            metadata:
              annotations:
                add-annotation: "from_with_squid_proxy"
              labels:
                add-label: "from_with_squid_proxy"
            spec: {}
      squid:
        container_squid:
          image: "escaped/image"
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
              port: 3128
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 1
            initialDelaySeconds: 0
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: 3128
            timeoutSeconds: 3
          resources:
            limits:
              memory: "400Mi"
            requests:
              cpu: "100m"
              memory: "210Mi"
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 5
            tcpSocket:
              port: 3128
            timeoutSeconds: 5
        metadata:
          annotations:
            add-annotation: "from_with_squid_proxy"
          labels:
            add-label: "from_with_squid_proxy"
        spec:
          template:
            metadata:
              annotations:
                add-annotation: "from_with_squid_proxy"
              labels:
                add-label: "from_with_squid_proxy"
            spec: {}
    enable_squid: true
    env:
      c-icap:
        CLAMD_IP: "127.0.0.1"
        CLAMD_MAXSIZE: "50m"
      clamav: {}
    minAvailable: 1
    namespace: "with_squid_proxy"
    namespaceAnnotations: {}
    namespaceLabels: {}
    replicas: 2
    squid_domain: "test-icap-virusscan.apps.c-hin-test-rma1.hin-infra.ch"
    test: true
kind: ConfigMap
metadata:
  name: debug-configmap
  namespace: with_squid_proxy
