apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: clamav-icap
    instance: monitoring
  name: clamav-icap
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clamav-icap
      instance: monitoring
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: clamav-icap
        instance: monitoring
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: clamav-icap
                    instance: monitoring
                topologyKey: kubernetes.io/hostname
              weight: 1
      containers:
        - env: []
          image: ghcr.io/vshn/clamav:20260420_095651
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
              port: 3310
            timeoutSeconds: 5
          name: clamav
          ports:
            - containerPort: 3310
              name: clamav
          readinessProbe:
            failureThreshold: 1
            initialDelaySeconds: 0
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: 3310
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 2000m
              memory: 3072Mi
            requests:
              cpu: 120m
              memory: 1280Mi
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 5
            tcpSocket:
              port: 3310
            timeoutSeconds: 5
        - env:
            - name: CLAMD_IP
              value: 127.0.0.1
            - name: CLAMD_MAXSIZE
              value: 50m
          image: ghcr.io/vshn/c-icap:20260420_095301
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
              port: 1344
            timeoutSeconds: 5
          name: c-icap
          ports:
            - containerPort: 1344
              name: icap
          readinessProbe:
            failureThreshold: 1
            initialDelaySeconds: 0
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: 1344
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 120m
              memory: 200Mi
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 5
            tcpSocket:
              port: 1344
            timeoutSeconds: 5
