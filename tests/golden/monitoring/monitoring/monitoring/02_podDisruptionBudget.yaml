apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app: clamav-icap
    instance: monitoring
  name: clamav-icap
  namespace: monitoring
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: clamav-icap
      instance: monitoring
  unhealthyPodEvictionPolicy: IfHealthyBudget
